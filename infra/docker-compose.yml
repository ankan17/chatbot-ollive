services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ollive
      POSTGRES_PASSWORD: ollive
      POSTGRES_DB: ollive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollive"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: ../.env
    environment:
      # Container-internal hostnames override the localhost values in .env
      DATABASE_URL: postgres://ollive:ollive@postgres:5432/ollive
      REDIS_URL: redis://redis:6379
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      # Node 20 has global fetch — no curl needed
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  ingestion-worker:
    build:
      context: ..
      dockerfile: apps/ingestion-worker/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://ollive:ollive@postgres:5432/ollive
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
