server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse-proxy locations (matched before the SPA fallback) ─────────
    # SSE-safe settings for /v1/: disable buffering, use HTTP/1.1, long timeout
    # Required for chat token streaming (POST /v1/conversations/:id/messages)
    location /v1/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA history fallback ─────────────────────────────────────────────────
    # Unknown paths serve index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
